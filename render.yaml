services:
  - type: web
    name: smart-job-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-job-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app

  - type: pserv
    name: smart-job-db
    runtime: postgresql
    plan: free
