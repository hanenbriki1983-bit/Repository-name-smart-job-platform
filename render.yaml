services:
  - type: static
    name: smart-job-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://smart-job-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: smart-job-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-job-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://smart-job-frontend.onrender.com

  - type: pserv
    name: smart-job-db
    runtime: postgresql
    plan: free
